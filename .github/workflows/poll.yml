name: poll
on:
  # schedule removed 2026-07-21: Actions cron delivered ~90-min gaps
  # (measured); the Oracle VM crontab is the primary poller now — see
  # ops/RUNBOOK.md. Manual/backfill polls remain available via dispatch.
  workflow_dispatch:
concurrency:
  group: poll
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - run: python -m bikes.poll
      - name: Commit data
        run: |
          git config user.name "bikes-poller"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet && exit 0
          git commit -m "data: poll $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase
          git push
